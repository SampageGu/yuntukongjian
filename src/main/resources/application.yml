server:
  servlet:
    context-path: /api
  port: 8123

spring:
  application:
    name: yu-picture-backend
  servlet:
    multipart:
      max-file-size: 10MB
  #    数据库
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/yu_picture
    username: root
    password: 020325ggg
#    redis 配置
  redis:
    database: 2
    host: 192.168.100.128
    port: 6379
    timeout: 5000
    password: 020325ggg
  profiles:
    active: local
mybatis-plus:
  configuration:
    # MyBatis 配置
    map-underscore-to-camel-case: false
    # 开发环境打印日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDelete
      logic-delete-value: 1
      logic-not-delete-value: 0

#接口文档配置
knife4j:
  enable: true
  openapi:
    title: Knife4j官方文档
    url: https://docs.xiaominfo.com
    version: v4.0
    license: Apache 2.0
    license-url: https://stackoverflow.com/
    terms-of-service-url: https://stackoverflow.com/
    group:
      default:
        api-rule: package
        api-rule-resources:
          - com.yupi.yupicturebakend.controller
          -
